<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Roles</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Gestión de Roles</h1>
      <span id="api-status" class="badge badge--off">API desconectada</span>
    </header>

    <section class="card">
      <h2>Crear rol</h2>
      <form id="form-crear">
        <div class="field">
          <label for="nombre-rol">Nombre del rol</label>
          <input
            type="text"
            id="nombre-rol"
            placeholder="Ej: Administrador"
            required
            maxlength="100"
          />
        </div>
        <button type="submit" class="btn btn--primary">Crear</button>
      </form>
      <p id="msg-crear" class="msg" aria-live="polite"></p>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Roles registrados</h2>
        <button id="btn-recargar" class="btn btn--secondary">Recargar</button>
      </div>
      <div id="tabla-wrapper">
        <table id="tabla-roles">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="tbody-roles">
            <tr>
              <td colspan="3" class="empty">Cargando…</td>
            </tr>
          </tbody>
        </table>
      </div>
      <p id="msg-lista" class="msg" aria-live="polite"></p>
    </section>
  </div>

  <div id="modal-confirm" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-box">
      <h3 id="modal-title">Confirmar eliminación</h3>
      <p id="modal-body"></p>
      <div class="modal-actions">
        <button id="btn-confirmar" class="btn btn--danger">Eliminar</button>
        <button id="btn-cancelar" class="btn btn--secondary">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
